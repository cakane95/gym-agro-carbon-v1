# Medium Compliance

# Scenario 4: Hard / Stochastic
# Tight reward gaps, high noise, and 15% tree destruction risk.
# The most challenging configuration — stress test for all algorithms.

experiment:
  name: "gama-agrocarbon-reward-contextual"
  timeHorizon: 20
  nbReplicates: 100

environment:
  nS: 8
  nA: 4
  nC: 3
  trigger_action: 2
  p_cut: 0.15
  difficulty: "hard"

gama:
  gaml_experiment_name: "gym_env"
  farmer:
    household_size: 5
    tree_knowledge: 0.6
    base_compliance: 0.75
    food_pressure_penalty: 0.2
    tree_knowledge_bonus: 0.1
    fallback_action: 3

agents:
  - class: "GlobalETC"
    params:
      exploration_limit: 3
      gamma: 0.99
      epsilon: 1.0e-6
      max_iter: 3000

  - class: "GlobalETC"
    params:
      exploration_limit: 5
      gamma: 0.99
      epsilon: 1.0e-6
      max_iter: 3000

  - class: "GlobalETC"
    params:
      exploration_limit: 10
      gamma: 0.99
      epsilon: 1.0e-6
      max_iter: 3000

  - class: "GlobalUCRL3"
    params:
      delta: 0.05
      K: -1
      max_reward: 2.5
      
  - class: "GlobalQLearning"
    params:
      gamma: 0.99
      epsilon: 0.3
      epsilon_min: 0.02
      epsilon_decay: 0.98
      alpha: 0.1
      optimistic_init: 0.0

  - class: "GlobalIMEDRL"
    params:
      max_iter: 3000
      epsilon: 1.0e-3
      max_reward: 2.5

  - class: "SemiLocalIMEDRL"
    params:
      max_iter: 3000
      epsilon: 1.0e-3
      max_reward: 2.5